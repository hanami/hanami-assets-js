name: CI
run-name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'CI' }}

on:
  push:
    branches: ["main", "release-*", "ci/*"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "release-*"]
  schedule:
    - cron: "30 4 * * *"

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 25.x
          - 24.x
          - 22.x
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          persist-credentials: false
      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # zizmor: ignore[cache-poisoning]
        with:
          node-version: ${{ matrix.node-version }}
      - name: Cache Node modules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # zizmor: ignore[cache-poisoning]
        with:
          # `npm ci` saves Node modules to ~/.npm
          path: ~/.npm
          key: node-modules-${{ runner.os }}-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-${{ matrix.node-version }}-
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx prettier . --check
      - name: Test
        run: npm test

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@7a9194bad497f0b993708eeaf10fc0a2d726eb71

  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs: tests
    steps:
      - name: Trigger release workflow
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a
        with:
          github-token: ${{ secrets.RELEASE_MACHINE_DISPATCH_TOKEN }}
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const repo = context.repo.owner + "/" + context.repo.repo;

            const tagMessage = await github.rest.git.getTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_sha: context.sha
            }).then(res => res.data.message).catch(() => "");
            const announce = /(skip-announce|no-announce)/i.test(tagMessage) ? "false" : "true";

            await github.rest.actions.createWorkflowDispatch({
              owner: "hanakai-rb",
              repo: "release-machine",
              workflow_id: "release-npm.yml",
              ref: "main",
              inputs: { repo, tag, announce }
            });

            const workflowUrl = "https://github.com/hanakai-rb/release-machine/actions/workflows/release-npm.yml";
            await core.summary
              .addHeading("Release Triggered")
              .addRaw(`Triggered release workflow for <code>${tag}</code>`)
              .addLink("View release workflow", workflowUrl)
              .write();
